name: Lucide Icon Inventory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    name: Generate and Commit Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Lucide inventory reports
        run: npm run inventory:lucide

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucide-inventory-reports
          path: reports/
          retention-days: 30

      - name: Commit reports (if changed)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain reports/)" ]]; then
            echo "No changes in reports/. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/
          git commit -m "Update Lucide inventory reports"
          git push
