name: Lucide Icon Inventory

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate lucide inventory
        run: npm run inventory:lucide

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucide-inventory-reports
          path: reports/
          if-no-files-found: error

      - name: Commit updated reports
        run: |
          if git diff --quiet -- reports; then
            echo "No report changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "chore: refresh lucide inventory reports"
          git push origin HEAD:${{ github.ref_name }}
