name: Mirror Repository

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror to mindful-path-copy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone source as bare mirror
        run: git clone --mirror https://github.com/${{ github.repository }}.git

      - name: Push all refs to destination
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          cd mindful-path.git
          git push --mirror https://yossi-dabby:${MIRROR_TOKEN}@github.com/yossi-dabby/mindful-path-copy.git
