name: Branch Cleanup Wave 8

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: >
          Type CONFIRM_BRANCH_CLEANUP_WAVE_8_LOW_RISK to proceed.
          Any other value will abort the run immediately.
        required: true
        default: ''

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    name: Branch Cleanup Wave 8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches and tags
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          git fetch origin --tags --prune

      - name: Verify confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CONFIRM_BRANCH_CLEANUP_WAVE_8_LOW_RISK" ]; then
            echo "ERROR: Confirmation input did not match."
            echo "Expected: CONFIRM_BRANCH_CLEANUP_WAVE_8_LOW_RISK"
            echo "Received: ${{ github.event.inputs.confirm }}"
            exit 1
          fi
          echo "Confirmation accepted."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Configure git identity for archive tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run branch cleanup script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/branch-cleanup-wave-8.mjs

      - name: Upload cleanup report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-cleanup-wave-8-report
          path: branch-cleanup-wave-8-report.md
          retention-days: 90
          if-no-files-found: warn
