name: Playwright Android E2E Tests

on:
  # Manual trigger — run on demand from the Actions tab.
  workflow_dispatch:

  # Nightly scheduled run (2:00 AM UTC).
  schedule:
    - cron: '0 2 * * *'

jobs:
  android-e2e:
    name: Android E2E Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Start dev server
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 5173 > devserver.log 2>&1 &
          echo "Dev server started (logging to devserver.log)"

      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:5173 --timeout 60000

      - name: Run Android Playwright tests
        run: npm run test:e2e:android
        env:
          CI: true
          BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_TEST_BASE_URL: http://127.0.0.1:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-android
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-android
          path: test-results/
          retention-days: 7

      - name: Upload dev server log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: devserver-log-android
          path: devserver.log
          retention-days: 7
